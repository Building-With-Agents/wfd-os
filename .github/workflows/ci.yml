name: CI

on:
  pull_request:
  push:
    branches: [master]

permissions:
  contents: read

jobs:
  lint:
    name: Lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install ruff==0.5.7
      - name: Run ruff
        run: ruff check . --output-format=github
        # Permissive during Phase 1 of the wfdos-common refactor.
        # Tightened per-service as #27 lands proper packaging.
        continue-on-error: true

  test:
    name: Pytest + coverage (wfdos-common)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install wfdos-common + monorepo root[dev] + test deps
        run: |
          # wfdos-common pulls most transitive deps (pydantic, sqlalchemy,
          # psycopg2-binary, httpx, structlog, itsdangerous, slowapi, etc.).
          pip install -e packages/wfdos-common
          # Install monorepo root with the [dev] extra so every agents.*
          # module can be imported at test-collection time. This pulls
          # numpy (student_api), anthropic (scoping/*), google-generativeai
          # (assistant/base.py), pandas/openpyxl/pdfplumber (grant/wji),
          # aiohttp (grant/market-intel/scoping bots), SQLAlchemy, etc.
          # Without [dev], tests ModuleNotFoundError on 8+ agents.
          pip install -e '.[dev]'
          # FastAPI's `Form(...)` (wji_api) + `UploadFile` need this
          # extra — not declared in any of our dep lists because the
          # runtime error only surfaces at route-dispatch time.
          pip install python-multipart
          # test_secrets_baseline.py shells out to `python -m detect_secrets`
          # — it must be in the same venv as pytest.
          pip install detect-secrets==1.5.0
      - name: Run pytest with coverage floor
        # Coverage floor raised per phase — Phase 3 target is 50%.
        # Plan raises to 60% after #29 (endpoint validation) lands,
        # 70% at Phase 5 exit.
        run: |
          pytest packages/wfdos-common/tests \
            --cov=wfdos_common \
            --cov-report=term \
            --cov-fail-under=50

  secrets:
    name: Secret scan (detect-secrets)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - run: pip install detect-secrets==1.5.0
      - name: Scan against baseline
        # Fails if any NEW secret appears that is not already in .secrets.baseline.
        # Update the baseline with: `detect-secrets scan > .secrets.baseline`
        # and review + audit the diff before committing.
        run: detect-secrets scan --baseline .secrets.baseline
