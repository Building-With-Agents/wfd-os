# wfdos-platform nginx config (#30)
# ---------------------------------
#
# This file is the committed source-of-truth for the edge proxy on the
# production VM once #30 is deployed. Live VM state at
# /etc/nginx/sites-available/wfdos-platform is a symlinked copy — any
# change should land here first and get deployed via the runbook at the
# bottom of this file.
#
# Responsibilities:
#   1. TLS termination for every platform hostname.
#   2. Host-header based tenant routing: map each hostname to an
#      X-Tenant-Id header forwarded to upstream services. Services pick
#      it up via TenantResolutionMiddleware from wfdos_common.tenancy (#16).
#   3. Per-role rate limits (approximated at the edge; authoritative
#      limits live in slowapi inside each service).
#   4. HTTPS redirect for HTTP traffic.
#   5. Static asset pass-through for Next.js /_next/static.
#
# Standalone-service deploys (that don't live behind this edge) still
# work — they just rely on wfdos_common.auth + wfdos_common.tenancy to
# pull the tenant from the Host header directly. The edge proxy makes
# the platform's multi-tenant flow deterministic; it is not a hard
# dependency for tier-1 endpoints to function.

# ---------------------------------------------------------------------
# Rate-limit zones. These are per-IP approximations; the authoritative
# per-role limits live in slowapi inside each service. Rates here are
# intentionally permissive so legitimate bursts don't get edge-blocked.
# ---------------------------------------------------------------------

limit_req_zone $binary_remote_addr zone=platform_default:10m rate=60r/m;
limit_req_zone $binary_remote_addr zone=platform_login:10m rate=6r/m;
limit_req_zone $binary_remote_addr zone=platform_api:10m rate=120r/m;
# LaborPulse is more expensive (LLM cost at JIE) than generic API but bursts
# are expected during demo floor use. Slower than platform_api, faster than
# platform_login.
limit_req_zone $binary_remote_addr zone=platform_laborpulse:10m rate=60r/m;

# ---------------------------------------------------------------------
# Upstream maps.
# When new services come online, add their port here and map them via
# the `location` blocks below.
# ---------------------------------------------------------------------

upstream wfdos_portal       { server 127.0.0.1:3001; }
upstream wfdos_student_api  { server 127.0.0.1:8001; }
upstream wfdos_showcase_api { server 127.0.0.1:8002; }
upstream wfdos_consulting_api { server 127.0.0.1:8003; }
upstream wfdos_college_api  { server 127.0.0.1:8004; }
upstream wfdos_wji_api      { server 127.0.0.1:8007; }
upstream wfdos_reporting_api { server 127.0.0.1:8000; }
upstream wfdos_marketing_api { server 127.0.0.1:8008; }
upstream wfdos_assistant_api { server 127.0.0.1:8009; }
upstream wfdos_apollo_api   { server 127.0.0.1:8010; }
upstream wfdos_recruiting_api { server 127.0.0.1:8012; }
upstream wfdos_cockpit_api  { server 127.0.0.1:8013; }
upstream wfdos_grant_compliance_api { server 127.0.0.1:8014; }
upstream wfdos_laborpulse_api { server 127.0.0.1:8015; }

# ---------------------------------------------------------------------
# Host → X-Tenant-Id map. Nginx looks this up once per request and
# forwards X-Tenant-Id to every backend. Upstream services read it via
# wfdos_common.tenancy.TenantResolutionMiddleware and never inspect
# the raw Host header themselves — that keeps the multi-tenant
# resolution logic in one place.
# ---------------------------------------------------------------------

map $host $wfdos_tenant_id {
    default                           waifinder-flagship;
    platform.thewaifinder.com         waifinder-flagship;
    talent.borderplexwfs.org          borderplex;
}

# ---------------------------------------------------------------------
# HTTP → HTTPS redirect.
# ---------------------------------------------------------------------

server {
    listen 80;
    listen [::]:80;
    server_name platform.thewaifinder.com talent.borderplexwfs.org;
    return 301 https://$host$request_uri;
}

# ---------------------------------------------------------------------
# Main server block — all platform traffic.
# ---------------------------------------------------------------------

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name platform.thewaifinder.com talent.borderplexwfs.org;

    # TLS — certbot owns these lines on the live VM.
    ssl_certificate     /etc/letsencrypt/live/platform.thewaifinder.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/platform.thewaifinder.com/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # HSTS — 6 months, all subdomains.
    add_header Strict-Transport-Security "max-age=15552000; includeSubDomains" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # Upload size — WJI grant files can be large.
    client_max_body_size 50M;

    # Forward the resolved tenant id + common proxy headers to every
    # upstream. Upstream services never see the raw Host header for
    # tenancy — they read X-Tenant-Id.
    proxy_http_version 1.1;
    proxy_set_header   Upgrade          $http_upgrade;
    proxy_set_header   Connection       "upgrade";
    proxy_set_header   Host             $host;
    proxy_set_header   X-Real-IP        $remote_addr;
    proxy_set_header   X-Forwarded-For  $proxy_add_x_forwarded_for;
    proxy_set_header   X-Forwarded-Proto $scheme;
    proxy_set_header   X-Tenant-Id      $wfdos_tenant_id;
    proxy_cache_bypass $http_upgrade;
    proxy_connect_timeout 60s;
    proxy_send_timeout    60s;
    proxy_read_timeout    60s;

    # -----------------------------------------------------------------
    # API routes (port-prefix stripped — services mount at /api/...).
    # -----------------------------------------------------------------

    # Stricter rate limit on auth endpoints specifically (brute-force
    # protection layered on top of the slowapi per-role limits).
    location /api/auth/login {
        limit_req zone=platform_login burst=10 nodelay;
        proxy_pass http://wfdos_portal;
    }

    # Student portal API.
    location /api/student/ {
        limit_req zone=platform_api burst=50 nodelay;
        proxy_pass http://wfdos_student_api;
    }

    # Talent showcase (public unauth reads allowed — see tier decorators).
    location /api/showcase/ {
        limit_req zone=platform_api burst=50 nodelay;
        proxy_pass http://wfdos_showcase_api;
    }

    location /api/consulting/ {
        limit_req zone=platform_api burst=50 nodelay;
        proxy_pass http://wfdos_consulting_api;
    }

    location /api/college/ {
        limit_req zone=platform_api burst=50 nodelay;
        proxy_pass http://wfdos_college_api;
    }

    location /api/wji/ {
        limit_req zone=platform_api burst=20 nodelay;
        proxy_pass http://wfdos_wji_api;
    }

    location /api/reporting/ {
        proxy_pass http://wfdos_reporting_api;
    }

    location /api/marketing/ {
        proxy_pass http://wfdos_marketing_api;
    }

    location /api/assistant/ {
        # Agent chat can be slower — give it more room.
        proxy_read_timeout 120s;
        proxy_pass http://wfdos_assistant_api;
    }

    location /api/apollo/ {
        proxy_pass http://wfdos_apollo_api;
    }

    # Recruiting (agents/job_board on :8012). Routes mount at the service
    # root (/jobs, /students, /applications, /stats/workday) — strip the
    # /api/recruiting prefix via the trailing slash on proxy_pass.
    location /api/recruiting/ {
        limit_req zone=platform_api burst=50 nodelay;
        proxy_pass http://wfdos_recruiting_api/;
    }

    # Finance cockpit (agents/finance/cockpit_api.py on :8013). Routes
    # mount at /cockpit/* at the service root — strip /api/finance via
    # the trailing slash so /api/finance/cockpit/hero → /cockpit/hero.
    location /api/finance/ {
        limit_req zone=platform_api burst=50 nodelay;
        proxy_pass http://wfdos_cockpit_api/;
    }

    # Grant compliance engine (agents/grant-compliance on :8014). Routes
    # mount at the service root (/qb/status, /grants, /transactions) —
    # strip /api/grant-compliance via the trailing slash.
    location /api/grant-compliance/ {
        limit_req zone=platform_api burst=50 nodelay;
        proxy_pass http://wfdos_grant_compliance_api/;
    }

    # LaborPulse — JIE Q&A proxy. Plain request/response JSON. Read
    # timeout bumped because JIE synthesis can legitimately take
    # 15-45s; everything else matches the other API locations. See
    # docs/laborpulse.md.
    location /api/laborpulse/ {
        limit_req zone=platform_laborpulse burst=20 nodelay;
        proxy_pass http://wfdos_laborpulse_api;
        proxy_read_timeout 300s;
    }

    # -----------------------------------------------------------------
    # Next.js portal. Everything non-/api/ falls through here.
    # -----------------------------------------------------------------

    location /_next/static/ {
        proxy_pass http://wfdos_portal;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, immutable";
    }

    location / {
        limit_req zone=platform_default burst=30 nodelay;
        proxy_pass http://wfdos_portal;
    }
}

# ---------------------------------------------------------------------
# Deployment runbook
# ---------------------------------------------------------------------
#
# 1. Review the diff in this repo against the live VM config:
#      ssh azwatechadmin@20.106.201.34 \
#        'sudo cat /etc/nginx/sites-available/wfdos-platform' \
#        | diff - infra/edge/nginx/wfdos-platform.conf
#
# 2. Copy the new file to the VM:
#      scp infra/edge/nginx/wfdos-platform.conf \
#        azwatechadmin@20.106.201.34:/tmp/wfdos-platform.conf
#
# 3. Stage + validate on the VM:
#      sudo cp /tmp/wfdos-platform.conf /etc/nginx/sites-available/wfdos-platform
#      sudo ln -sf ../sites-available/wfdos-platform \
#                   /etc/nginx/sites-enabled/wfdos-platform
#      sudo nginx -t
#
# 4. If `nginx -t` passes, reload (no downtime):
#      sudo systemctl reload nginx
#
# 5. Smoke test:
#      curl -I https://platform.thewaifinder.com/api/health
#      curl -sH 'Host: talent.borderplexwfs.org' \
#        http://127.0.0.1/api/health  # bypass TLS for local Host smoke
#
# Rollback: the pre-migration config is preserved as
# /etc/nginx/sites-available/wfd-os (singular, no 'wfdos-' prefix) from
# the pre-#30 deployment. `sudo rm /etc/nginx/sites-enabled/wfdos-platform`
# + `sudo ln -sf ../sites-available/wfd-os /etc/nginx/sites-enabled/wfd-os`
# + `sudo systemctl reload nginx` restores the previous single-tenant
# edge config.
